name: Automated Code Review

on:
  pull_request:
    branches:
      - main # Trigger khi có PR hướng vào nhánh main

jobs:
  checkstyle:
    name: Checkstyle Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25 # Hoặc phiên bản bạn đang dùng
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      # Chạy Checkstyle và đẩy comment trực tiếp vào PR
      - name: Run Checkstyle
        uses: dbelyaev/action-checkstyle@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          checkstyle_config: sun_checks.xml  # hoặc tệp cấu hình tùy chỉnh của bạn
          level: warning