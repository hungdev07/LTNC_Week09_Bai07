name: maven_ci.yml
on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]
jobs:
  build:
    runs-on: ${{ matrix.os}}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    # 2. Checkout mã nguồn từ Github
    - uses: actions/checkout@v4

    #3. Thiết lập môi trường JDK
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    #4. Chạy verify (Bao gồm cả test và check coverage)
    - name: Build with Maven
      run: mvn clean verify

    # Lưu trữ báo cáo JaCoCo
    - name: Upload JaCoCo Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-report
        path: target/site/jacoco/
